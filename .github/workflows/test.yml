name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - run: bun install --frozen-lockfile

      - name: Lint workflows
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          fail_level: error
          # github-check reporter uses the Checks API (read-only on PRs);
          # github-pr-review needs `pull-requests: write` which we don't grant
          # at workflow scope (Decision Q SHA-pin operations runbook =>
          # narrow permissions). Findings appear in the Checks tab + workflow
          # log; PR-inline comments deferred unless we widen permissions.
          reporter: github-check
          level: error

      - name: Typecheck
        run: bun run typecheck

      - name: Check verify-manifest drift
        run: bun run verify:drift

      - name: Format
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Check generic paths
        run: bun run check-generic-paths

      - name: Check import extensions
        run: bun run check-import-extensions

      - name: Check SPDX headers
        run: bun run check-spdx-headers

      - name: Test
        run: bun test
