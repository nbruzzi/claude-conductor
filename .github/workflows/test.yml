name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - run: bun install --frozen-lockfile

      - name: Lint workflow files (actionlint via reviewdog/action-actionlint)
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          fail_on_error: true
          reporter: github-pr-review
          level: error

      - name: Typecheck
        run: bun run typecheck

      - name: Format
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Check generic paths
        run: bun run check-generic-paths

      - name: Check import extensions
        run: bun run check-import-extensions

      - name: Check bundled-registrations parity (skips if dotfiles absent)
        run: bun run check-bundled-registrations-parity

      - name: Test
        run: bun test
