name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - run: bun install --frozen-lockfile

      # TODO(post-0.8): add `rhysd/actionlint@<SHA> # v<N>` step before this
      # comment block. Deferred from sub-step 0.7 step 3 (originally per
      # Decision D) and again at sub-step 0.8 commit 7 (per Q1 default at
      # execute time — no SHA pin supplied). When SHA pin is researched, fold
      # in via a separate sub-step. RE-3 standard (SHA-pinned third-party
      # actions) applies; commit must include `decisions/phase-0.md` SHA-pin
      # operations runbook entry per v2 plan Q6 + R13.

      - name: Typecheck
        run: bun run typecheck

      - name: Format
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Check generic paths
        run: bun run check-generic-paths

      - name: Check import extensions
        run: bun run check-import-extensions

      - name: Check bundled-registrations parity (skips if dotfiles absent)
        run: bun run check-bundled-registrations-parity

      - name: Test
        run: bun test
