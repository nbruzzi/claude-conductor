name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - run: bun install --frozen-lockfile

      # TODO(0.7-followup): add actionlint workflow self-test step.
      # Plan v2.1 §"Decision D" specified actionlint integration but the
      # devDep / script / workflow-step trio was deferred at step 3
      # execution because actionlint lacks a clean npm distribution
      # (Bravo's RE-OOS-2 fallback path; documented in Risks table). For
      # now, first-push CI run is the YAML integration verification.

      - name: Typecheck
        run: bun run typecheck

      - name: Format
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun test
